<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Angle Flow: a process node between angle brackets  < ● > -->
  <!-- Concept: angle brackets = code/generics/SDK; circle = BPMN node; together: typed process SDK -->
  <rect width="100" height="100" rx="22" fill="#0f0f1a"/>
  <!-- Left angle < -->
  <path d="M42 24 L18 50 L42 76"
        fill="none" stroke="#4d8af0" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right angle > -->
  <path d="M58 24 L82 50 L58 76"
        fill="none" stroke="#4d8af0" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center node -->
  <circle cx="50" cy="50" r="12" fill="#4d8af0"/>
</svg>
