<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Process Cycle: 270° arc with a token dot and arrowhead -->
  <!-- Concept: BPMN token-based execution — a token (dot) travels through a cyclic process -->
  <!-- Arc: center (50,50) r=30, from bottom (50,80) CCW 270° to right (80,50) -->
  <!-- Gap is at the lower-right quadrant, suggesting the cycle continues -->
  <rect width="100" height="100" rx="22" fill="#0f0f1a"/>
  <!-- 270° arc counterclockwise: bottom → left → top → right -->
  <path d="M50 80 A30 30 0 1 0 80 50"
        fill="none" stroke="#4d8af0" stroke-width="9" stroke-linecap="round"/>
  <!-- Token dot at start of arc (bottom) -->
  <circle cx="50" cy="80" r="9" fill="#4d8af0"/>
  <!-- Arrowhead at arc end (right side, 80,50), pointing downward (CCW direction) -->
  <polygon points="80,52 73,38 87,38" fill="#4d8af0"/>
</svg>
