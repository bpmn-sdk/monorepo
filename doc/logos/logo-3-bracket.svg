<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SDK Bracket: a process node enclosed in square brackets  [ ● ] -->
  <!-- Concept: brackets = SDK/code wrapping; circle = BPMN process node/event -->
  <rect width="100" height="100" rx="22" fill="#0f0f1a"/>
  <!-- Left bracket [ -->
  <path d="M32 20 L19 20 L19 80 L32 80"
        fill="none" stroke="#4d8af0" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket ] -->
  <path d="M68 20 L81 20 L81 80 L68 80"
        fill="none" stroke="#4d8af0" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center node: BPMN event circle -->
  <circle cx="50" cy="50" r="14" fill="#4d8af0"/>
</svg>
