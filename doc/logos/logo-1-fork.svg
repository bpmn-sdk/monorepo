<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fork / Gateway Split: one input node branches into two outputs -->
  <!-- Concept: parallel gateway output — very BPMN-specific, reads as Y/fork at any size -->
  <rect width="100" height="100" rx="22" fill="#0f0f1a"/>
  <!-- Branch lines from left node -->
  <line x1="32" y1="50" x2="66" y2="24" stroke="#4d8af0" stroke-width="5" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="66" y2="76" stroke="#4d8af0" stroke-width="5" stroke-linecap="round"/>
  <!-- Left node: process start / input -->
  <circle cx="20" cy="50" r="13" fill="#4d8af0"/>
  <!-- Top-right node: output path A -->
  <circle cx="80" cy="20" r="13" fill="#4d8af0"/>
  <!-- Bottom-right node: output path B -->
  <circle cx="80" cy="80" r="13" fill="#4d8af0"/>
</svg>
