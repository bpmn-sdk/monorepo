<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gateway: filled diamond with inner plus — the iconic BPMN parallel gateway -->
  <!-- Colors: landing page tokens oklch(9% 0.025 270) bg, oklch(55% 0.22 280) accent -->
  <style>
    .bg { fill: oklch(9% 0.025 270) }
    .fg { fill: oklch(55% 0.22 280) }
  </style>
  <rect class="bg" width="100" height="100" rx="22"/>
  <polygon class="fg" points="50,10 90,50 50,90 10,50"/>
  <line x1="50" y1="27" x2="50" y2="73" stroke="oklch(9% 0.025 270)" stroke-width="7.5" stroke-linecap="round"/>
  <line x1="27" y1="50" x2="73" y2="50" stroke="oklch(9% 0.025 270)" stroke-width="7.5" stroke-linecap="round"/>
</svg>
