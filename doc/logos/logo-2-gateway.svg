<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gateway: filled diamond with inner plus — the iconic BPMN parallel gateway -->
  <!-- Concept: the diamond is unique to BPMN, instantly recognizable, bold at any size -->
  <rect width="100" height="100" rx="22" fill="#0f0f1a"/>
  <!-- Diamond shape -->
  <polygon points="50,10 90,50 50,90 10,50" fill="#4d8af0"/>
  <!-- Inner plus (negative space) — references parallel gateway -->
  <line x1="50" y1="27" x2="50" y2="73" stroke="#0f0f1a" stroke-width="7.5" stroke-linecap="round"/>
  <line x1="27" y1="50" x2="73" y2="50" stroke="#0f0f1a" stroke-width="7.5" stroke-linecap="round"/>
</svg>
