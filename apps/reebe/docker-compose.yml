services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reebe
      POSTGRES_USER: reebe
      POSTGRES_PASSWORD: reebe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reebe -d reebe"]
      interval: 5s
      timeout: 5s
      retries: 5

  reebe:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REEBE_DATABASE__URL: postgres://reebe:reebe@postgres:5432/reebe
      REEBE_SERVER__PORT: "8080"
      RUST_LOG: "reebe=info"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
